version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zariya-db
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432" # Bind PostgreSQL to local port 5433 to avoid host 5432 conflict
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - zariya-network

  backend:
    image: eclipse-temurin:21-jdk-alpine
    container_name: zariya-backend
    working_dir: /app
    volumes:
      - ./backend/finance:/app
      - gradle_cache:/root/.gradle
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/finance
      SPRING_DATASOURCE_USERNAME: finance_user
      SPRING_DATASOURCE_PASSWORD: finance_secure_password
      PORT: 5174
    ports:
      - "127.0.0.1:5174:5174" # Bind backend only to localhost
    command: ./gradlew bootRun --no-daemon
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - zariya-network

  frontend:
    image: node:20-alpine
    container_name: zariya-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ~/.npm:/.npm
    ports:
      - "127.0.0.1:5173:5173" # Bind frontend only to localhost
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - zariya-network

  nginx:
    build:
      context: ./nginx
    container_name: zariya-nginx-gateway
    ports:
      - "83:80" # Expose HTTP port 83 to the host machine
    depends_on:
      - frontend
      - backend
    networks:
      - zariya-network

volumes:
  postgres_data:
  gradle_cache:

networks:
  zariya-network:
    driver: bridge
