# Zariya Donor Module preview — Vite + React
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback (single-page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
