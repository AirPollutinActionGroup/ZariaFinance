<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Zariya design preview: interactive UX mock of all scope-document modules with SAMPLE DATA.
     This is a design artifact, not application code — the production app (src/) renders live API data only. -->
<title>Zariya · Interactive UI Preview</title>
<style>
  :root{
    --g950:#0C0D0F; --g900:#17191C; --g800:#232629; --g700:#33373D; --g500:#6F747D;
    --g300:#C6C9CF; --g200:#DFE1E5; --g100:#EDEEF1; --g50:#F6F7F8; --g25:#FAFAFB;
    --platinum:#E8EAED; --silver:#B7BCC3; --hairline:rgba(255,255,255,.08);
    --accent-grad:linear-gradient(135deg,#2B2F35 0%,#17191C 55%,#202329 100%);
    --accent-grad-hover:linear-gradient(135deg,#33383F 0%,#1C1F23 55%,#262A30 100%);
    --ok:#0F7B4D; --ok-bg:#E6F4EE; --warn:#9A6700; --warn-bg:#FBF3E0;
    --err:#C4362A; --err-bg:#FBEAE8; --info:#2F5FA8; --info-bg:#E9F0FA;
    --bg:var(--g50); --card:#FFFFFF; --ink:var(--g900); --muted:var(--g500);
    --line:var(--g200); --line-soft:var(--g100); --thead:var(--g25); --barfill:var(--g900);
    --btn-ghost-ink:var(--g700); --shadow:0 1px 2px rgba(12,13,15,.05),0 1px 3px rgba(12,13,15,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#101214; --card:#17191C; --ink:#E8EAED; --muted:#9BA0A8;
      --line:#2A2E33; --line-soft:#222529; --thead:#1C1F23; --barfill:#B7BCC3;
      --ok-bg:rgba(15,123,77,.16); --warn-bg:rgba(154,103,0,.16);
      --err-bg:rgba(196,54,42,.16); --info-bg:rgba(47,95,168,.16);
      --ok:#4CC38A; --warn:#E2B33C; --err:#F08578; --info:#7EA6E0;
      --btn-ghost-ink:#C6C9CF; --shadow:0 1px 2px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="light"]{
    --bg:#F6F7F8; --card:#FFFFFF; --ink:#17191C; --muted:#6F747D;
    --line:#DFE1E5; --line-soft:#EDEEF1; --thead:#FAFAFB; --barfill:#17191C;
    --ok:#0F7B4D; --ok-bg:#E6F4EE; --warn:#9A6700; --warn-bg:#FBF3E0;
    --err:#C4362A; --err-bg:#FBEAE8; --info:#2F5FA8; --info-bg:#E9F0FA;
    --btn-ghost-ink:#33373D; --shadow:0 1px 2px rgba(12,13,15,.05),0 1px 3px rgba(12,13,15,.06);
  }
  :root[data-theme="dark"]{
    --bg:#101214; --card:#17191C; --ink:#E8EAED; --muted:#9BA0A8;
    --line:#2A2E33; --line-soft:#222529; --thead:#1C1F23; --barfill:#B7BCC3;
    --ok-bg:rgba(15,123,77,.16); --warn-bg:rgba(154,103,0,.16);
    --err-bg:rgba(196,54,42,.16); --info-bg:rgba(47,95,168,.16);
    --ok:#4CC38A; --warn:#E2B33C; --err:#F08578; --info:#7EA6E0;
    --btn-ghost-ink:#C6C9CF; --shadow:0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    background:var(--bg); color:var(--ink); font-size:14px; line-height:1.5;
  }
  .frame{display:flex; min-height:100vh}

  /* ── Sidebar (graphite in both themes — brand surface) ── */
  .rail{
    width:240px; flex:0 0 240px; background:var(--g950); color:var(--silver);
    display:flex; flex-direction:column; border-right:1px solid var(--hairline);
    position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{display:flex; gap:12px; align-items:center; padding:20px 20px 12px}
  .brand-tile{
    width:40px;height:40px;border-radius:10px;background:var(--accent-grad);
    border:1px solid var(--hairline); display:grid;place-items:center;
    color:var(--platinum); font-weight:800; font-size:19px; flex:none;
  }
  .brand b{color:var(--platinum); display:block; line-height:1.15}
  .brand small{color:var(--silver); font-size:11px}
  .navgroup{margin-top:12px}
  .navlabel{
    font-size:10px; letter-spacing:.09em; text-transform:uppercase; font-weight:600;
    color:var(--g500); padding:0 20px 5px;
  }
  .nav{list-style:none; margin:0; padding:0 10px}
  .nav button{
    width:100%; display:flex; align-items:center; gap:10px; text-align:left;
    background:none; border:1px solid transparent; border-radius:9px; cursor:pointer;
    color:var(--silver); font:inherit; font-weight:500; font-size:13px; padding:7.5px 12px; margin-bottom:2px;
  }
  .nav button:hover{background:var(--g900)}
  .nav button:focus-visible{outline:2px solid var(--platinum); outline-offset:-2px}
  .nav button[aria-current="true"]{
    background:var(--accent-grad); color:var(--platinum); font-weight:600;
    border-color:var(--hairline);
  }
  .nav .glyph{width:16px; height:16px; flex:0 0 16px; opacity:.85}
  .railfoot{margin-top:auto; border-top:1px solid var(--hairline); padding:14px 20px; font-size:11px; color:var(--g500)}

  /* ── Top bar ── */
  .main{flex:1; min-width:0; display:flex; flex-direction:column}
  .topbar{
    display:flex; align-items:center; justify-content:flex-end; gap:14px;
    background:var(--card); border-bottom:1px solid var(--line);
    padding:10px 24px; position:sticky; top:0; z-index:5;
  }
  .demo-chip{
    margin-right:auto; font-size:11px; font-weight:600; color:var(--warn);
    background:var(--warn-bg); border-radius:999px; padding:4px 10px;
  }
  .role-picker{display:flex; align-items:center; gap:8px}
  .role-picker label{font-size:11px; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; font-weight:600}
  .role-picker select{
    font:inherit; font-size:13px; font-weight:600; color:var(--ink);
    background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:6px 10px; cursor:pointer;
  }
  .avatar{
    width:32px;height:32px;border-radius:50%;background:var(--accent-grad);
    color:var(--platinum); display:grid; place-items:center; font-size:12px; font-weight:700;
    border:1px solid var(--hairline); flex:none;
  }
  .who{line-height:1.2}
  .who b{font-size:12.5px; display:block}
  .who span{font-size:11px; color:var(--muted)}

  /* ── Content ── */
  .content{padding:26px 30px; max-width:1120px; width:100%; margin:0 auto}
  .pagehead{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap}
  h1{font-size:24px; font-weight:700; letter-spacing:-.02em; margin:0; text-wrap:balance}
  .sub{color:var(--muted); margin:4px 0 0; font-size:13px}
  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(185px,1fr)); gap:14px; margin-bottom:22px}
  .kpi{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; box-shadow:var(--shadow)}
  .kpi .lab{font-size:12px; color:var(--muted); margin-bottom:6px}
  .kpi .val{font-size:23px; font-weight:700; letter-spacing:-.02em; font-variant-numeric:tabular-nums}
  .kpi .hint{font-size:11px; color:var(--muted); margin-top:3px}
  .kpi.hero{background:var(--accent-grad); border-color:var(--hairline); box-shadow:0 8px 24px rgba(12,13,15,.35)}
  .kpi.hero .lab,.kpi.hero .hint{color:var(--silver)}
  .kpi.hero .val{color:var(--platinum)}

  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); overflow:hidden}
  .card h2{font-size:15px; font-weight:600; margin:0; padding:16px 20px 12px}
  .card .cardsub{font-size:12px; color:var(--muted); margin:-8px 0 0; padding:0 20px 12px}
  .tablewrap{overflow-x:auto}
  table{width:100%; border-collapse:collapse; font-size:13px}
  thead th{
    background:var(--thead); color:var(--muted); text-align:left; font-size:11.5px;
    font-weight:600; letter-spacing:.03em; padding:9px 14px; border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{padding:10px 14px; border-bottom:1px solid var(--line-soft); white-space:nowrap}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.rowlink{cursor:pointer}
  tbody tr.rowlink:hover{background:var(--thead)}
  td.money,th.money{text-align:right}
  td.money{font-variant-numeric:tabular-nums; font-weight:600}
  .pct-ok{color:var(--ok); font-weight:700}
  .pct-bad{color:var(--err); font-weight:700}

  .chip{display:inline-block; font-size:11px; font-weight:600; border-radius:999px; padding:3px 10px; line-height:1.5}
  .chip.neutral{background:var(--line-soft); color:var(--btn-ghost-ink)}
  .chip.graphite{background:var(--accent-grad); color:var(--platinum); border:1px solid var(--hairline)}
  .chip.outlined{background:transparent; color:var(--muted); border:1px solid var(--line)}
  .chip.ok{background:var(--ok-bg); color:var(--ok)}
  .chip.warn{background:var(--warn-bg); color:var(--warn)}
  .chip.err{background:var(--err-bg); color:var(--err)}
  .chip.info{background:var(--info-bg); color:var(--info)}

  .bar{display:inline-block; width:110px; height:6px; background:var(--line); border-radius:99px; vertical-align:middle; margin-right:8px}
  .bar i{display:block; height:100%; background:var(--barfill); border-radius:99px}

  .btn{font:inherit; font-size:13px; font-weight:600; border-radius:8px; cursor:pointer; padding:8px 15px; border:1px solid transparent}
  .btn:focus-visible{outline:2px solid var(--info); outline-offset:2px}
  .btn.primary{background:var(--accent-grad); color:var(--platinum); border-color:var(--hairline)}
  .btn.primary:hover{background:var(--accent-grad-hover)}
  .btn.ghost{background:transparent; color:var(--btn-ghost-ink); border-color:var(--line)}
  .btn.ghost:hover{background:var(--thead)}
  .btn.danger{background:transparent; color:var(--err); border-color:var(--err)}
  .btn.danger:hover{background:var(--err-bg)}
  .btn.sm{padding:5px 11px; font-size:12px}
  .btn[disabled]{opacity:.45; cursor:not-allowed}

  .toolbar{display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; align-items:center}
  .search{flex:1; max-width:360px; display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:7px 12px}
  .search svg{width:15px;height:15px;color:var(--muted); flex:none}
  .search input{border:none; outline:none; background:none; font:inherit; color:var(--ink); width:100%}
  .seg{display:inline-flex; background:var(--card); border:1px solid var(--line); border-radius:9px; padding:3px; gap:2px}
  .seg button{font:inherit; font-size:12.5px; font-weight:600; border:none; background:none; color:var(--muted); border-radius:7px; padding:5px 14px; cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--accent-grad); color:var(--platinum)}

  .detail-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px 22px; padding:6px 20px 18px}
  .field .lab{font-size:11px; color:var(--muted); letter-spacing:.02em}
  .field .val{font-size:13.5px; font-weight:500; margin-top:1px}
  .chiprow{display:flex; gap:8px; padding:4px 20px 10px; flex-wrap:wrap}
  .backlink{background:none;border:none;color:var(--muted);font:inherit;font-size:12.5px;cursor:pointer;padding:0;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px}
  .backlink:hover{color:var(--ink)}
  .stack{display:flex; flex-direction:column; gap:18px}
  .empty{padding:40px 20px; text-align:center; color:var(--muted); font-size:13px}
  .note{font-size:12px; color:var(--muted); background:var(--card); border:1px dashed var(--line); border-radius:10px; padding:10px 14px; margin-top:20px}
  .note b{color:var(--ink)}
  .alertbox{display:flex; gap:12px; align-items:flex-start; background:var(--err-bg); border:1px solid var(--err); border-radius:12px; padding:14px 16px; margin-bottom:18px}
  .alertbox.warn{background:var(--warn-bg); border-color:var(--warn)}
  .alertbox b{display:block; font-size:13.5px}
  .alertbox p{margin:2px 0 0; font-size:12.5px; color:var(--muted)}
  .scenarios{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px}
  .scen{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; box-shadow:var(--shadow); cursor:pointer}
  .scen[aria-pressed="true"]{border-color:var(--ink); box-shadow:0 0 0 1px var(--ink)}
  .scen h3{margin:0 0 4px; font-size:14px}
  .scen p{margin:0 0 10px; font-size:12.5px; color:var(--muted)}
  .reports{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:14px}
  .report{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; box-shadow:var(--shadow)}
  .report h3{margin:0 0 4px; font-size:14px}
  .report p{margin:0 0 12px; font-size:12.5px; color:var(--muted); min-height:36px}
  .report .exports{display:flex; gap:6px; margin-bottom:12px}

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(8px);
    background:var(--g900); color:var(--platinum); border:1px solid var(--hairline);
    padding:10px 18px; border-radius:10px; font-size:13px; font-weight:600;
    opacity:0; pointer-events:none; transition:opacity .18s, transform .18s; z-index:60;
    box-shadow:0 8px 24px rgba(12,13,15,.45); max-width:88vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  dialog{border:1px solid var(--line); border-radius:14px; padding:0; background:var(--card); color:var(--ink); width:min(400px,90vw); box-shadow:0 16px 48px rgba(12,13,15,.4)}
  dialog::backdrop{background:rgba(12,13,15,.5)}
  .dlg-body{padding:22px 24px 8px}
  .dlg-body h3{margin:0 0 8px; font-size:16px}
  .dlg-body p{margin:0; color:var(--muted); font-size:13.5px}
  .dlg-actions{display:flex; justify-content:flex-end; gap:10px; padding:18px 24px 20px}
  @media (prefers-reduced-motion: reduce){ .toast{transition:none} }
  @media (max-width:840px){
    .rail{position:fixed; z-index:20; transform:translateX(-100%); transition:transform .2s}
    .rail.open{transform:none}
    .main{width:100%}
    .burger{display:inline-grid !important}
  }
  .burger{display:none; place-items:center; width:34px;height:34px; border-radius:8px; background:none; border:1px solid var(--line); color:var(--ink); cursor:pointer; margin-right:auto}

  /* ── Auth screens (graphite backdrop, committed single-look surface) ── */
  .auth{position:fixed; inset:0; background:var(--g950); z-index:40; overflow-y:auto; display:none}
  .auth.show{display:block}
  .auth-wrap{min-height:100%; display:grid; place-items:center; padding:32px 16px}
  .auth-col{width:100%; max-width:440px}
  .auth-col.wide{max-width:560px}
  .auth-brand{display:flex; justify-content:center; margin-bottom:22px}
  .auth-card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:32px; box-shadow:0 16px 48px rgba(12,13,15,.5)}
  .auth-card h1{font-size:20px; margin:0 0 4px}
  .auth-card .sub{margin-bottom:20px}
  .fld{margin-bottom:14px}
  .fld label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px}
  .fld input{width:100%; font:inherit; color:var(--ink); background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:9px 12px; outline:none}
  .fld input:focus{border-color:var(--ink)}
  .fld.invalid input{border-color:var(--err)}
  .fld .msg{font-size:11.5px; color:var(--err); margin-top:3px; min-height:14px}
  .fld .hint{font-size:11.5px; color:var(--muted); margin-top:3px}
  .auth-grid{display:grid; grid-template-columns:1fr 1fr; gap:0 14px}
  @media (max-width:560px){.auth-grid{grid-template-columns:1fr}}
  .auth-alert{background:var(--warn-bg); color:var(--warn); border-radius:9px; padding:10px 14px; font-size:12.5px; font-weight:500; margin-bottom:14px; display:none}
  .auth-alert.show{display:block}
  .auth-div{display:flex; align-items:center; gap:12px; color:var(--muted); font-size:12px; margin:18px 0}
  .auth-div::before,.auth-div::after{content:''; flex:1; height:1px; background:var(--line)}
  .auth-foot{text-align:center; font-size:12.5px; color:var(--muted); margin-top:16px}
  .auth-foot button{background:none;border:none;color:var(--ink);font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:underline;padding:0}
  .wfull{width:100%}
  .pend{ text-align:center }
  .pend .hourglass{font-size:38px; margin-bottom:10px}
</style>

<div class="frame">
  <aside class="rail" id="rail">
    <div class="brand">
      <div class="brand-tile" aria-hidden="true">Z</div>
      <div><b>Zariya</b><small>Budget · Trade · Report</small></div>
    </div>
    <nav aria-label="Modules" id="navhost"></nav>
    <div class="railfoot">v0.1 · Review Draft<br>A-PAG · TCF</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="burger" id="burger" aria-label="Toggle navigation">☰</button>
      <span class="demo-chip">Design preview · sample data — production binds to the live ZariaFinance API</span>
      <div class="role-picker">
        <label for="role">Role</label>
        <select id="role" aria-label="Switch role">
          <option value="FINANCE_OFFICER">Accounts / Finance Officer</option>
          <option value="CEO">CEO</option>
          <option value="FUNDRAISING_LEAD">Fund Raising Lead</option>
        </select>
      </div>
      <div class="avatar" id="avatar">FO</div>
      <div class="who"><b id="who-name">Finance Officer</b><span id="who-role">Accounts · full edit</span></div>
    </header>
    <main class="content" id="view" aria-live="polite"></main>
  </div>
</div>

<div class="auth" id="auth" aria-hidden="true"><div class="auth-wrap"><div class="auth-col" id="auth-col">
  <div class="auth-brand">
    <div style="display:flex;gap:12px;align-items:center">
      <div class="brand-tile" aria-hidden="true">Z</div>
      <div><b style="color:var(--platinum);display:block;line-height:1.15">Zariya</b><small style="color:var(--silver);font-size:11px">Budget · Trade · Report</small></div>
    </div>
  </div>
  <div class="auth-card" id="auth-card"></div>
</div></div></div>

<div class="toast" id="toast" role="status"></div>
<dialog id="dlg">
  <div class="dlg-body"><h3 id="dlg-title"></h3><p id="dlg-text"></p></div>
  <div class="dlg-actions">
    <button class="btn ghost" id="dlg-cancel">Cancel</button>
    <button class="btn primary" id="dlg-ok">Confirm</button>
  </div>
</dialog>

<script>
/* ── Permission engine (mirrors src/core/permissions/permissions.js) ── */
const POLICY = {
  CEO:               { '*': ['view','comment'] },
  FINANCE_OFFICER:   { '*': ['view','edit','comment','approve'] },
  FUNDRAISING_LEAD:  { 'donor-management': ['view','edit','comment'] },
};
const can = (role, action, mod) => {
  const p = POLICY[role]; if (!p) return false;
  const acts = p[mod] || p['*']; return acts ? acts.includes(action) : false;
};

/* ── Formatting ── */
const CR=1e7, L=1e5;
const inr = v => Math.abs(v)>=CR ? `₹${(v/CR).toFixed(2)} Cr` : Math.abs(v)>=L ? `₹${(v/L).toFixed(2)} L` : `₹${v.toLocaleString('en-IN')}`;
const dt  = s => new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const chip = ([label,tone]) => `<span class="chip ${tone}">${label}</span>`;
const esc = s => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = v => `${v>0?'+':''}${v.toFixed(1)}%`;

/* ── Sample data (labelled demo data; shapes follow the scope document) ── */
const donors = [

function vVariance(){
  const modes={BvA:['Budget vs Actual','Are we on track vs the approved plan?'],BvF:['Budget vs Forecast','Where will we land by year-end vs plan?'],FvA:['Forecast vs Actual','How accurate has our forecasting been?']};
  const calc=b=>{
    const ytdBudget=b.fy/2; /* six months elapsed */
    if(varMode==='BvA') return (b.actual-ytdBudget)/ytdBudget*100;
    if(varMode==='BvF') return (b.forecast-b.fy)/b.fy*100;
    return (b.actual-(b.forecast/2))/(b.forecast/2)*100;
  };
  const rows=budget.map(b=>{
    const v=calc(b); const flagged=Math.abs(v)>5;
    const favourable=v<0;
    return `<tr>
      <td><b>${esc(b.line)}</b></td>
      <td class="money">${inr(b.fy/2)}</td>
      <td class="money">${inr(varMode==='BvF'?b.forecast:b.actual)}</td>
      <td class="money"><span class="${favourable?'pct-ok':'pct-bad'}">${pct(v)}</span></td>
      <td>${chip(favourable?['Favourable','ok']:['Adverse','err'])}</td>
      <td>${flagged?chip(['Commentary required','warn']):chip(['Within threshold','neutral'])}</td>
    </tr>`}).join('');
  return `
    <div class="pagehead">
      <div><h1>Variance</h1><p class="sub">${modes[varMode][1]}</p></div>
      <div class="seg" role="group" aria-label="Variance measure">
        ${Object.keys(modes).map(m=>`<button aria-pressed="${m===varMode}" data-vm="${m}">${m}</button>`).join('')}
      </div>
    </div>
    <div class="alertbox">
      <div><b>BL-02 Programme Materials &amp; Kits breached the 5% materiality threshold (+3.3% MTD, trending +9.8%)</b>
      <p>Root-cause commentary is mandatory at period close. The Optimiser has 3 modelled remediation scenarios ready.</p></div>
      <button class="btn sm ghost" id="to-opt" style="margin-left:auto;flex:none">Open Optimiser →</button>
    </div>
    <div class="card">
      <h2>${modes[varMode][0]} — half-year</h2>
      <p class="cardsub">Materiality threshold 5% (configurable per line, §2.4). Cost underspend = favourable; visual coding for non-finance readers.</p>
      <div class="tablewrap"><table>
        <thead><tr><th>Cost line</th><th class="money">${varMode==='FvA'?'Forecast (½ yr)':'Budget (½ yr)'}</th><th class="money">${varMode==='BvF'?'Forecast (FY)':'Actual YTD'}</th><th class="money">Variance</th><th>Tag</th><th>Commentary</th></tr></thead>
        <tbody>${rows}</tbody></table></div>
    </div>`;
}

    ['Board pack','Board / Trustees','Headline BvA, year-end forecast, key variances. Auto-generated at period close.'],
    ['Management accounts','CEO, CFO, senior team','Full BvA by department with commentary and trends.'],
    ['Donor / funder report','Individual donors','Ring-fenced project income & expenditure, template-formatted per funder.'],
    ['Fundraising pipeline','Fundraising team','Committed vs received vs target income across the donor register.'],
    ['Audit support pack','External auditors','Trial balance, transaction listing, reconciliations.'],
  ];
  return `
    <div class="pagehead">
      <div><h1>Reports</h1><p class="sub">Different readers, different views of the same truth</p></div>
    </div>
    <div class="reports">
      ${R.map(([t,aud,d])=>`
        <div class="report">
          <h3>${t}</h3>
          <p><b style="color:var(--ink)">${aud}.</b> ${d}</p>
          <div class="exports">${chip(['PDF','outlined'])}${chip(['Excel','outlined'])}${chip(['CSV','outlined'])}</div>
          <div style="display:flex;gap:8px">
            <button class="btn sm primary" data-rep="${t}">Generate</button>
            ${canEdit?`<button class="btn sm ghost" data-sched="${t}">Schedule</button>`:''}
          </div>
        </div>`).join('')}
    </div>
    <div class="note"><b>Scheduled dispatch</b> with distribution-list management ships with the reporting API (§6.2).</div>`;
}

function vDenied(){
  return `<div class="pagehead"><div><h1>Page not found</h1>
    <p class="sub">This role has no view permission for that module, so the route resolves to 404 — route existence is never leaked.</p></div></div>`;
}

/* ── Router / render ── */
const VIEWS={dashboard:vDashboard,budget:vBudget,forecast:vForecast,actuals:vActuals,variance:vVariance,committed:vCommitted,unassigned:vUnassigned,mapping:vMapping,donors:vDonors,grants:vGrants,optimiser:vOptimiser,reports:vReports};
function render(){
  const [av,nm,ds]=ROLE_META[role];
  $('avatar').textContent=av; $('who-name').textContent=nm; $('who-role').textContent=ds;
  const v=$('view');
  const mod=ROUTE_MOD[route.name];
  if(!can(role,'view',mod)){v.innerHTML=vDenied();}
  else if(route.name==='donor') v.innerHTML=vDonor(route.id);
  else if(route.name==='grant') v.innerHTML=vGrant(route.id);
  else v.innerHTML=VIEWS[route.name]();
  renderNav(); wire();
}
function wire(){
  document.querySelectorAll('tr[data-d]').forEach(tr=>tr.onclick=()=>{route={name:'donor',id:+tr.dataset.d};render()});
  document.querySelectorAll('tr[data-g]').forEach(tr=>tr.onclick=()=>{route={name:'grant',id:+tr.dataset.g};render()});
  const keepFocus=(id,setter)=>{const el=$(id); if(el){el.oninput=e=>{setter(e.target.value);const p=e.target.selectionStart;render();const n=$(id);n.focus();n.setSelectionRange(p,p)}}};
  keepFocus('donor-q',v=>donorQ=v); keepFocus('grant-q',v=>grantQ=v);
  const on=(id,fn)=>{const el=$(id); if(el)el.onclick=fn};
  on('back-donors',()=>{route={name:'donors'};render()});
  on('back-grants',()=>{route={name:'grants'};render()});
  on('new-donor',()=>toast('Opens the donor form — RHF + Zod, mirrors CreateDonorRequest'));
  on('new-grant',()=>toast('Opens the grant form bound to POST /api/v1/grants'));
  on('edit-donor',()=>toast('Opens the edit form — donorCode immutable (no code in UpdateDonorRequest)'));
  on('newver',()=>toast('Starts budget revision v3 — approval workflow + audit trail (§2.1)'));
  on('reopen',()=>toast('Formal re-open request routed to CFO — budgets stay locked post-approval'));
  on('updfc',()=>toast('Opens editable cells for open periods only — Apr–Jun are locked'));
  on('reclass',()=>toast('Reclassification: original entry preserved, dual authorisation required'));
  on('remap',()=>toast('Opens period re-mapping — change-logged; totals must sum to 100%'));
  on('newpo',()=>toast('Registers a PO / contract / offer letter into the committed layer'));
  on('to-opt',()=>{route={name:'optimiser'};render()});
  document.querySelectorAll('[data-vm]').forEach(b=>b.onclick=()=>{varMode=b.dataset.vm;render()});
  document.querySelectorAll('[data-po]').forEach(b=>b.onclick=async()=>{
    const c=committed.find(x=>x.id===b.dataset.po); const next=PO_NEXT[c.stage];
    if(await confirmDlg('Advance commitment',`${c.id} → ${ENUM.postate[next][0]}. ${next==='FULLY_INVOICED'?'Invoice posting will auto-release this commitment from Available Budget.':''}`,'Advance')){
      c.stage=next; render(); toast(`${c.id} is now ${ENUM.postate[next][0]}`);
    }});
  document.querySelectorAll('[data-ua]').forEach(b=>b.onclick=async()=>{
    const u=unassigned.find(x=>x.id===b.dataset.ua);
    if(await confirmDlg('Allocate expense',`Map ${u.id} (${inr(u.amount)}) to a funding source. In production this opens the donor-mapping picker.`,'Allocate')){
      unassigned=unassigned.filter(x=>x.id!==u.id); render(); toast(`${u.id} allocated — unassigned total ${inr(unassigned.reduce((s,x)=>s+x.amount,0))}`);
    }});
  document.querySelectorAll('[data-scen]').forEach(el=>{
    const pick=()=>{chosenScen=el.dataset.scen;scenApplied=false;render()};
    el.onclick=pick; el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();pick()}};
  });
  on('pushfc',async()=>{
    if(!chosenScen||scenApplied)return;
    const s=scenarios.find(x=>x.id===chosenScen);
    if(await confirmDlg('Push scenario to forecast',`Scenario ${s.id} — ${s.name}. The live forecast updates and, if material, a re-baseline review triggers CFO approval.`,'Push to forecast')){
      scenApplied=true; render(); toast(`Scenario ${s.id} pushed to live forecast — re-baseline review queued`);
    }});
  document.querySelectorAll('[data-mou]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const d=donors.find(x=>x.id===+b.dataset.mou);
    toast(`Opens ${d.mou} — grant document register (DocumentType MOU, versioned)`);
  });
  document.querySelectorAll('[data-rep]').forEach(b=>b.onclick=()=>toast(`${b.dataset.rep} generated — exports: PDF · Excel · CSV`));
  document.querySelectorAll('[data-sched]').forEach(b=>b.onclick=()=>toast(`${b.dataset.sched}: schedule + distribution list (§6.2)`));
  const ta=$('toggle-active'); if(ta)ta.onclick=async()=>{
    const d=donors.find(x=>x.id===route.id); const onA=!d.isActive;
    if(await confirmDlg(onA?'Activate donor':'Deactivate donor',
      `${onA?'Reactivate':'Deactivate'} ${d.donorName}? In production this calls PATCH /api/v1/donors/${d.id}/${onA?'activate':'deactivate'}.`,
      onA?'Activate':'Deactivate', !onA)){
      d.isActive=onA; d.status=onA?'ACTIVE':'INACTIVE'; render(); toast(`${d.donorName} ${onA?'activated':'deactivated'}`);
    }};
  const lc=$('lifecycle'); if(lc)lc.querySelectorAll('button').forEach(b=>b.onclick=async()=>{
    const g=grants.find(x=>x.id===route.id); const act=b.dataset.act;
    if(await confirmDlg(`${act[0].toUpperCase()+act.slice(1)} grant`,
      `${g.agreementName} → ${ENUM.gstat[NEXT[act]][0]}. In production this calls PATCH /api/v1/grants/${g.id}/${act}.`,
      act[0].toUpperCase()+act.slice(1), act==='close')){
      g.grantStatus=NEXT[act]; render(); toast(`Grant ${g.grantCode}: ${ENUM.gstat[g.grantStatus][0]}`);
    }});
}
$('role').onchange=e=>{
  role=e.target.value;
  if(!can(role,'view',ROUTE_MOD[route.name])) route={name:can(role,'view','dashboard')?'dashboard':'donors'};
  render();
};
$('burger').onclick=()=>$('rail').classList.toggle('open');

/* ── Auth flow (mirrors LoginPage / RegisterPage / PendingApprovalPage) ── */
let authView='login'; /* start signed-out, like the real app */
const field=(id,label,type,hint,half)=>`
  <div class="fld${half?'':''}" id="f-${id}">
    <label for="${id}">${label}</label>
    <input id="${id}" type="${type||'text'}" autocomplete="off">
    <div class="msg" id="m-${id}"></div>${hint?`<div class="hint">${hint}</div>`:''}
  </div>`;
function renderAuth(){
  const host=$('auth'), card=$('auth-card'), col=$('auth-col');
  if(authView==='in'){host.classList.remove('show');host.setAttribute('aria-hidden','true');return}
  host.classList.add('show');host.setAttribute('aria-hidden','false');
  col.classList.toggle('wide', authView==='register');
  if(authView==='login'){
    card.innerHTML=`
      <h1>Sign in</h1><p class="sub">Budgeting, Trading &amp; Reporting for A-PAG · TCF</p>
      <div class="auth-alert" id="login-alert">Sign-in is not available yet: the backend /api/userLogin controller has
      no endpoints (gap #1). Use “Continue in review mode” until backend authentication ships.</div>
      ${field('lg-user','Username')}
      ${field('lg-pass','Password','password')}
      <button class="btn primary wfull" id="do-login" style="padding:11px">Sign in</button>
      <div class="auth-div">or</div>
      <button class="btn ghost wfull" id="do-review">Continue in review mode</button>
      <div class="auth-foot">New here? <button id="go-register">Request an account</button></div>`;
    $('do-login').onclick=()=>{$('login-alert').classList.add('show')};
    $('do-review').onclick=()=>{authView='in';renderAuth();toast('Review mode — role switchable in the top bar (ADR-0004)')};
    $('go-register').onclick=()=>{authView='register';renderAuth()};
  }
  if(authView==='register'){
    card.innerHTML=`
      <h1>Request an account</h1><p class="sub">Access is granted after manual approval by the technology team.</p>
      <div class="auth-grid">
        ${field('rg-first','First name *')}
        ${field('rg-last','Last name')}
        ${field('rg-email','Email *','email')}
        ${field('rg-mob','Mobile number *','tel','10 digits, starting 6–9')}
        ${field('rg-user','Username *','text','4–20 characters')}
        <div></div>
        ${field('rg-pass','Password *','password','8–100 characters')}
        ${field('rg-conf','Confirm password *','password')}
      </div>
      <button class="btn primary wfull" id="do-register" style="padding:11px">Submit request</button>
      <div class="auth-foot">Already approved? <button id="go-login">Sign in</button></div>`;
    $('go-login').onclick=()=>{authView='login';renderAuth()};
    $('do-register').onclick=()=>{
      const v=id=>$(id).value.trim();
      const rules=[
        ['rg-first', v('rg-first')?'':'First name is required'],
        ['rg-email', /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v('rg-email'))?'':'Invalid email'],
        ['rg-mob',   /^[6-9]\d{9}$/.test(v('rg-mob'))?'':'Invalid mobile number'],
        ['rg-user',  v('rg-user').length>=4&&v('rg-user').length<=20?'':'Username must be between 4 and 20 characters'],
        ['rg-pass',  $('rg-pass').value.length>=8&&$('rg-pass').value.length<=100?'':'Password must be between 8 and 100 characters'],
        ['rg-conf',  $('rg-conf').value===$('rg-pass').value?'':'Passwords do not match'],
      ];
      let bad=false;
      rules.forEach(([id,msg])=>{
        $('m-'+id).textContent=msg; $('f-'+id).classList.toggle('invalid',Boolean(msg)); if(msg)bad=true;
      });
      if(!bad){authView='pending';renderAuth();}
      /* Validation mirrors AddUserRegisterDto; in production this POSTs /api/userRegister */
    };
  }
  if(authView==='pending'){
    card.innerHTML=`
      <div class="pend">
        <div class="hourglass" aria-hidden="true">⏳</div>
        <h1>Awaiting approval</h1>
        <p class="sub" style="margin-bottom:18px">Your request was received. Accounts are reviewed and approved manually by
        <b>technology@a-pag.org</b>. You can sign in once your account status is <b>Approved</b>
        (statuses: Pending Approval · Approved · Rejected · Suspended · Disabled).</p>
        <button class="btn primary wfull" id="go-login2">Back to sign in</button>
      </div>`;
    $('go-login2').onclick=()=>{authView='login';renderAuth()};
  }
}
/* Sign out from the identity chip */
document.querySelector('.who').style.cursor='pointer';
$('avatar').style.cursor='pointer';
const signOut=async()=>{ if(await confirmDlg('Sign out','End this session and return to the sign-in screen?','Sign out')){authView='login';renderAuth()} };
$('avatar').onclick=signOut; document.querySelector('.who').onclick=signOut;

render();
renderAuth();
</script>
